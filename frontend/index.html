<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#14161b" />
    <meta
      name="description"
      content="OdontoPrime — gestão para clínica odontológica. Pacientes, agenda, prontuário, financeiro e estoque em um só lugar."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..600&display=swap"
      rel="stylesheet"
    />
    <title>OdontoPrime · Gestão Odontológica</title>
    <script>
      // Aplica tema/densidade ANTES do primeiro paint (evita flash de tema).
      (function () {
        try {
          var raw = localStorage.getItem("clinic.appearance");
          var s = raw ? JSON.parse(raw).state : null;
          var theme = (s && s.theme) || "light";
          var resolved =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme;
          var el = document.documentElement;
          el.setAttribute("data-theme", resolved);
          el.setAttribute("data-density", (s && s.density) || "comfortable");
          if (s && s.preferences && s.preferences.highContrast)
            el.setAttribute("data-contrast", "high");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
